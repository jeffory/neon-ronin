name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.1"

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Import assets
        run: godot --headless --editor --quit 2>&1 || true

      - name: Rebuild scenes
        run: |
          for script in \
            scenes/build_bot.gd \
            scenes/build_player.gd \
            scenes/build_pickup_ammo.gd \
            scenes/build_pickup_health.gd \
            scenes/build_level.gd \
            scenes/build_hud.gd \
            scenes/build_main.gd \
            scenes/build_title.gd; do
            timeout 120 godot --headless --script "$script" 2>&1
          done

      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1

      - name: Add COOP/COEP headers
        run: |
          # Godot 4 requires SharedArrayBuffer, which needs cross-origin isolation
          cat > build/web/_headers <<'HEADERS'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          HEADERS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
