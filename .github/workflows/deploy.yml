name: Deploy to Netlify

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.1"

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install fontconfig
        run: |
          apt-get update && apt-get install -y --no-install-recommends fontconfig

      - name: Setup export templates
        run: |
          TEMPLATE_SRC="/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          TEMPLATE_DST="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$(dirname "$TEMPLATE_DST")"
          if [ "$TEMPLATE_SRC" != "$TEMPLATE_DST" ]; then
            ln -sf "$TEMPLATE_SRC" "$TEMPLATE_DST"
          fi

      - name: Import assets
        run: godot --headless --editor --quit 2>&1 || true

      - name: Optimize textures for web
        run: |
          # Enable VRAM compression and limit bot textures to 2048px
          # These are 4096x4096 uncompressed PNGs that bloat the .pck by ~250 MB
          for f in assets/glb/bot/bot_*.png.import assets/glb/bot/Rifle\ Aiming\ Idle_*.png.import; do
            if [ -f "$f" ]; then
              sed -i 's/compress\/mode=0/compress\/mode=2/' "$f"
              sed -i 's/process\/size_limit=0/process\/size_limit=2048/' "$f"
            fi
          done
          # Compress sky/background textures
          for f in assets/img/night_sky.png.import assets/img/title_bg.png.import assets/img/sunset_sky.png.import; do
            if [ -f "$f" ]; then
              sed -i 's/compress\/mode=0/compress\/mode=2/' "$f"
              sed -i 's/process\/size_limit=0/process\/size_limit=2048/' "$f"
            fi
          done
          # Re-import with new settings
          godot --headless --editor --quit 2>&1 || true

      - name: Rebuild scenes
        run: |
          for script in \
            scenes/build_bot.gd \
            scenes/build_player.gd \
            scenes/build_pickup_ammo.gd \
            scenes/build_pickup_health.gd \
            scenes/build_level.gd \
            scenes/build_hud.gd \
            scenes/build_settings_panel.gd \
            scenes/build_pause_menu.gd \
            scenes/build_main.gd \
            scenes/build_title.gd; do
            timeout 120 godot --headless --script "$script" 2>&1
          done

      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1

      - name: Add cross-origin isolation headers
        run: |
          cat > build/web/_headers << 'HEADERS'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          HEADERS

      - name: Deploy to Netlify
        run: |
          apt-get install -y --no-install-recommends nodejs npm
          npx netlify-cli deploy --prod --dir=build/web --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
